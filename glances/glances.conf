# =============================================================
# Glances Configuration — Mission Control
#
# Web server is enabled via the GLANCES_OPT=-w env var
# in docker-compose.yml — no need to set it here.
#
# This config keeps thresholds generous so you don't get
# stress-inducing red alerts on normal usage.
# =============================================================

[global]
refresh=3
check_update=false

# ─── CPU ──────────────────────────────────────────────────────
[cpu]
careful=60
warning=80
critical=95

# ─── MEMORY ───────────────────────────────────────────────────
[mem]
careful=60
warning=80
critical=95

[memswap]
careful=50
warning=70
critical=90

# ─── DISK I/O ─────────────────────────────────────────────────
[fs]
careful=70
warning=85
critical=95
hide=/boot.*,/snap.*

# ─── NETWORK ──────────────────────────────────────────────────
[network]
hide=lo,docker.*,br-.*,veth.*

# ─── DOCKER ───────────────────────────────────────────────────
[docker]
all=false

# ─── WEB SERVER ───────────────────────────────────────────────
[outputs]
curse_min_width=80
